  if(d.i){ var parts = d.i.split(/[,、，]+/); parts.forEach(function(p){p=p.trim();if(p)allTags[p]=(allTags[p]||0)+1})}
});
DATA.sort(function(a,b){return parseInt(a.s)-parseInt(b.s)});

var currentTag = '';

function renderFilters(){
  var html = '<button class="'+(currentTag?'':'active')+'" onclick="filterTag(\'\')">全部 ('+DATA.length+')</button>';
  var sorted = Object.keys(allTags).sort(function(a,b){return allTags[b]-allTags[a]});
  for(var i=0;i<Math.min(sorted.length,15);i++){
    var t = sorted[i];
    html += '<button class="'+(currentTag==t?'active':'')+'" onclick="filterTag(\''+t.replace(/'/g,"\\'")+'\')">'+t+' ('+allTags[t]+')</button>';
  }
  document.getElementById('filters').innerHTML=html;
  document.getElementById('total').textContent=DATA.length;
  var tc=0; for(var k in IMG_MAP){ tc+=IMG_MAP[k].length }
  document.getElementById('imgTotal').textContent=tc;
}

function filterTag(tag){currentTag = tag;renderFilters();renderList()}

function getMatchImgs(name){
  if(IMG_MAP[name]) return IMG_MAP[name];
  // fuzzy match
  var cn = name.replace(/[\s\(\)（）\-]/g,'').toLowerCase();
  for(var k in IMG_MAP){
    var ck = k.replace(/[\s\(\)（）\-]/g,'').toLowerCase();
    if(cn==ck || cn.indexOf(ck)>=0 || ck.indexOf(cn)>=0) return IMG_MAP[k];
  }
  return [];
}

function renderList(){
  var q = document.getElementById('search').value.toLowerCase();
  var list = document.getElementById('list');
  var html = ''; var count = 0;
  DATA.forEach(function(d,i){
    if(currentTag && d.i.indexOf(currentTag)==-1) return;
    if(q){
      var txt = (d.n+' '+d.i+' '+d.a+' '+d.p+' '+d.t+' '+d.k+' '+d.x+' '+d.f+' '+d.c+' '+d.e).toLowerCase();
      var kw = q.split(/\s+/).filter(function(w){return w.length>0});
      var ok = true;
      for(var k=0;k<kw.length;k++){ if(txt.indexOf(kw[k])==-1){ok=false;break} }
      if(!ok) return;
    }
    count++;
    var pid = 'item'+i;
    var imgs = getMatchImgs(d.n);
    var galleryHtml = '';
    if(imgs.length>0){
      galleryHtml += '<div class="gallery">';
      imgs.forEach(function(f){
        var src = 'img/'+encodeURIComponent(d.n)+'/'+encodeURIComponent(f);
        galleryHtml += '<img src="'+src+'" loading="lazy" onclick="event.stopPropagation();sh('+"'"+src.replace(/'/g,"\\'")+"'"+')">';
      });
      galleryHtml += '</div>';
    }
    var imgBadge = imgs.length>0 ? ' 📷'+imgs.length : '';
    html += '<div class="card" id="'+pid+'" onclick="toggle(\''+pid+'\',\''+d.n.replace(/'/g,"\\'")+'\')">'+
      '<div class="card-header"><div class="card-name">'+d.n+imgBadge+'</div></div>'+
      '<div class="card-meta">'+
        (d.i?'<span class="tag ind">'+d.i+'</span>':'')+
        (d.a?'<span class="tag">'+d.a+'</span>':'')+
        (d.t?'<span class="tag">'+d.t+'</span>':'')+
        (d.k?'<span class="tag">'+d.k+'</span>':'')+
      '</div>'+
      (d.p?'<div class="card-meta"><span class="tag prod" title="'+d.p.replace(/"/g,'&quot;')+'">'+d.p+'</span></div>':'')+
      '<div class="card-body">'+
        galleryHtml+
        makeRow('完工时间',d.t)+
        makeRow('座位信息',d.k)+
        makeRow('行业',d.i)+
        makeRow('地区',d.a)+
        makeRow('产品',d.p)+
        makeRow('安装信息',d.x)+
        makeRow('项目情况',d.f)+
        makeRow('联系人',d.c)+
        makeRow('工程师',d.e)+
      '</div>'+
    '</div>';
  });
  list.innerHTML = html || '<div class="empty">��有匹配的项目</div>';
  document.getElementById('count').textContent = '显示 '+count+' / '+DATA.length+' 条';
}

function makeRow(label,value){
  if(!value) return '';
  return '<div class="detail-row"><div class="detail-label">'+label+'</div><div class="detail-value">'+value+'</div></div>';
}

function toggle(id,name){
  var el = document.getElementById(id);
  var wasOpen = el.classList.contains('open');
  var all = document.querySelectorAll('.card.open');
  for(var i=0;i<all.length;i++) all[i].classList.remove('open');
  if(!wasOpen){
    el.classList.add('open');
    el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function sh(src){
  document.getElementById('lbImg').src=src;
  document.getElementById('lightbox').classList.add('show');
}

document.getElementById('search').addEventListener('input', renderList);
renderFilters();
renderList();
</script>
</body>
</html>
