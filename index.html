body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:#1a1a2e;padding:12px 16px;box-shadow:0 2px 8px rgba(0,0,0,.2)}

.filters button{background:#2a2a4a;color:#aaa;border:none;padding:4px 10px;border-radius:14px;font-size:12px;cursor:pointer}
.filters button.active{background:#e94560;color:#fff}
#list{padding:12px}
.card{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;cursor:pointer}

.card-name{font-size:15px;font-weight:600;line-height:1.4}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 10px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666}
.tag.ind{background:#e8f4fd;color:#2196f3}
.card-body{display:none;padding:8px 14px 14px;border-top:1px solid #f0f0f0}
.card.open .card-body{display:block}
.card.open{box-shadow:0 2px 8px rgba(0,0,0,.15)}
.detail-row{display:flex;padding:6px 0;font-size:13px;border-bottom:1px solid #f5f5f5}
.detail-label{color:#999;width:70px;flex-shrink:0}
.detail-value{flex:1;color:#333;word-break:break-all}
.gallery{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 4px}
.gallery img{width:120px;height:auto;border-radius:6px;cursor:pointer;border:1px solid #eee;transition:transform .2s}
.gallery img:hover{transform:scale(1.05)}
.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:999;justify-content:center;align-items:center}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:8px}
.lightbox .close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer}
.empty{text-align:center;padding:40px;color:#999;font-size:14px}
#count{text-align:center;color:#999;font-size:12px;padding:8px}
@media(min-width:768px){#list{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{margin-bottom:0}}
</style>

var allTags = {};
DATA.forEach(function(d){
  if(d.i){ var parts = d.i.split(/[,、，]+/); parts.forEach(function(p){p=p.trim();if(p)allTags[p]=(allTags[p]||0)+1})}
});
DATA.sort(function(a,b){return parseInt(a.s)-parseInt(b.s)});

var currentTag = '';

function renderFilters(){
  var html = '<button class="'+(currentTag?'':'active')+'" onclick="filterTag(\'\')">全部 ('+DATA.length+')</button>';
  var sorted = Object.keys(allTags).sort(function(a,b){return allTags[b]-allTags[a]});
  for(var i=0;i<Math.min(sorted.length,15);i++){
    var t = sorted[i];
    html += '<button class="'+(currentTag==t?'active':'')+'" onclick="filterTag(\''+t.replace(/'/g,"\\'")+'\')">'+t+' ('+allTags[t]+')</button>';
  }
  document.getElementById('filters').innerHTML=html;
  document.getElementById('total').textContent=DATA.length;
}

function filterTag(tag){currentTag = tag;renderFilters();renderList()}

function renderList(){
  var q = document.getElementById('search').value.toLowerCase();
  var list = document.getElementById('list');
  var html = ''; var count = 0;
  DATA.forEach(function(d,i){
    if(currentTag && d.i.indexOf(currentTag)==-1) return;
    if(q){
      var txt = (d.n+' '+d.i+' '+d.a+' '+d.p+' '+d.t+' '+d.k+' '+d.x+' '+d.f+' '+d.c+' '+d.e).toLowerCase();
      var kw = q.split(/\s+/).filter(function(w){return w.length>0});
      var ok = true;
      for(var k=0;k<kw.length;k++){ if(txt.indexOf(kw[k])==-1){ok=false;break} }
      if(!ok) return;
    }
    count++;
    var pid = 'item'+i;
    var galleryHtml = '<div class="gallery" id="gal'+i+'"></div>';
    html += '<div class="card" id="'+pid+'" onclick="toggle(\''+pid+'\','+i+')">'+
      '<div class="card-header"><div class="card-name">'+d.n+'</div></div>'+
      '<div class="card-meta">'+
        (d.i?'<span class="tag ind">'+d.i+'</span>':'')+
        (d.a?'<span class="tag">'+d.a+'</span>':'')+
        (d.t?'<span class="tag">'+d.t+'</span>':'')+
        (d.k?'<span class="tag">'+d.k+'</span>':'')+
      '</div>'+
      (d.p?'<div class="card-meta"><span class="tag prod">'+d.p+'</span></div>':'')+
      '<div class="card-body">'+
        galleryHtml+
        makeRow('完工时间',d.t)+
        makeRow('座位信息',d.k)+
        makeRow('行业',d.i)+
        makeRow('地区',d.a)+
        makeRow('产品',d.p)+
        makeRow('安装信息',d.x)+
        makeRow('项目情况',d.f)+
        makeRow('联系人',d.c)+
        makeRow('工程师',d.e)+
      '</div>'+
    '</div>';
  });
  list.innerHTML = html || '<div class="empty">没有匹配的项目</div>';
  document.getElementById('count').textContent = '显示 '+count+' / '+DATA.length+' 条';
}

function makeRow(label,value){
  if(!value) return '';
  return '<div class="detail-row"><div class="detail-label">'+label+'</div><div class="detail-value">'+value+'</div></div>';
}

var LOADED = {};

function toggle(id,idx){
  var el = document.getElementById(id);
  if(el.classList.contains('open')){ el.classList.remove('open'); return }
  var all = document.querySelectorAll('.card.open');
  for(var i=0;i<all.length;i++) all[i].classList.remove('open');
  el.classList.add('open');
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
  
  if(!LOADED[idx]){
    LOADED[idx] = true;
    var seq = DATA[idx].s;
    var gal = document.getElementById('gal'+idx);
    if(!gal) return;
    for(var n=1; n<=50; n++){
      var fn = (n<10?'0'+n:''+n) + '.jpg';
      var img = document.createElement('img');
      img.src = 'img/'+seq+'/'+fn;
      img.loading = 'lazy';
      img.onclick = function(e){ e.stopPropagation(); sh(this.src) };
      img.onerror = function(){ this.style.display='none' };
      gal.appendChild(img);
    }
  }
}

function sh(src){
  document.getElementById('lbImg').src=src;
  document.getElementById('lightbox').classList.add('show');
}

document.getElementById('search').addEventListener('input', renderList);
renderFilters();
renderList();
</script>
</body>
